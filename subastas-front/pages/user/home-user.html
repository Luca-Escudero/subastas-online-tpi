<!doctype html>
<html lang="es">

<head>
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
  <title>Subastas Online | Catálogo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    crossorigin="anonymous">
  <link rel="preload" href="/css/adminlte.css" as="style" />
  <link rel="stylesheet" href="/css/adminlte.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    crossorigin="anonymous" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>

<body class="layout-fixed sidebar-expand-lg sidebar-open bg-body-tertiary">
  <div class="app-wrapper">
    <nav class="app-header navbar navbar-expand bg-body">
      <div class="container-fluid">
        <ul class="navbar-nav">
          <li class="nav-item">
            <a class="nav-link" data-lte-toggle="sidebar" href="#" role="button">
              <i class="bi bi-list"></i>
            </a>
          </li>
        </ul>
        <ul class="navbar-nav ms-auto">
          <li class="nav-item dropdown user-menu">
            <a href="#" class="nav-link dropdown-toggle" data-bs-toggle="dropdown">
              <img src="/assets/img/user1-128x128.jpg" class="user-image rounded-circle shadow" alt="Usuario" />
              <span class="d-none d-md-inline" id="navbar-user-email">Usuario</span>
            </a>
            <ul class="dropdown-menu dropdown-menu-lg dropdown-menu-end">
              <li class="user-footer">
                <div class="d-grid">
                  <a href="/pages/register-login/login.html" class="btn btn-danger w-100" id="logout-button">Cerrar
                    Sesión</a>
                </div>
              </li>
            </ul>
          </li>
        </ul>
      </div>
    </nav>

    <aside class="app-sidebar bg-body-secondary shadow" data-bs-theme="dark">
      <div class="sidebar-brand">
        <a href="/index.html" class="brand-link">
          <img src="/assets/img/logo.png" alt="Logo" class="brand-image opacity-75 shadow" />
          <span class="brand-text fw-light">Subastas Online</span>
        </a>
      </div>
      <div class="sidebar-wrapper">
        <nav class="mt-2">
          <ul class="nav sidebar-menu flex-column" data-lte-toggle="treeview" role="navigation"
            aria-label="Main navigation" data-accordion="false">
            <li class="nav-item">
              <a href="home-user.html" class="nav-link active">
                <i class="nav-icon bi bi-grid-fill"></i>
                <p>Catálogo de Subastas</p>
              </a>
            </li>
            <li class="nav-item" id="seller-nav-item" style="display:none">
              <a href="/pages/seller/home-seller.html" class="nav-link">
                <i class="nav-icon bi bi-shop"></i>
                <p>Mis Productos / Ventas</p>
              </a>
            </li>
          </ul>
        </nav>
      </div>
    </aside>

    <main class="app-main">
      <div class="app-content-header">
        <div class="container-fluid">
          <div class="row">
            <div class="col-sm-6">
              <h3 class="mb-0">Catálogo de Subastas</h3>
            </div>
          </div>
        </div>
      </div>

      <div class="app-content">
        <div class="container-fluid">

          <div class="row mb-3">
            <div class="col-md-4">
              <select id="filtro-categoria" class="form-select">
                <option value="">Todas las categorías</option>
              </select>
            </div>
          </div>

          <div id="loading-msg" class="text-muted">Cargando subastas...</div>
          <div id="empty-msg" class="text-muted" style="display:none">No hay subastas disponibles por el momento.</div>

          <div class="row" id="subastas-container"></div>

        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    crossorigin="anonymous"></script>
  <script src="/js/adminlte.js"></script>
  <script type="module" src="/js/user/catalogo.js"></script>
</body>

</html>
