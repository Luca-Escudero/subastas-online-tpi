<!doctype html>
<html lang="es">

<head>
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
  <title>Subastas Online | Detalle</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    crossorigin="anonymous">
  <link rel="preload" href="/css/adminlte.css" as="style" />
  <link rel="stylesheet" href="/css/adminlte.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    crossorigin="anonymous" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>

<body class="layout-fixed sidebar-expand-lg sidebar-open bg-body-tertiary">
  <div class="app-wrapper">
    <nav class="app-header navbar navbar-expand bg-body">
      <div class="container-fluid">
        <ul class="navbar-nav">
          <li class="nav-item">
            <a class="nav-link" data-lte-toggle="sidebar" href="#" role="button">
              <i class="bi bi-list"></i>
            </a>
          </li>
        </ul>
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a href="/pages/register-login/login.html" class="nav-link" id="logout-button">Cerrar Sesión</a>
          </li>
        </ul>
      </div>
    </nav>

    <aside class="app-sidebar bg-body-secondary shadow" data-bs-theme="dark">
      <div class="sidebar-brand">
        <a href="/index.html" class="brand-link">
          <img src="/assets/img/logo.png" alt="Logo" class="brand-image opacity-75 shadow" />
          <span class="brand-text fw-light">Subastas Online</span>
        </a>
      </div>
      <div class="sidebar-wrapper">
        <nav class="mt-2">
          <ul class="nav sidebar-menu flex-column">
            <li class="nav-item">
              <a href="home-user.html" class="nav-link">
                <i class="nav-icon bi bi-arrow-left"></i>
                <p>Volver al catálogo</p>
              </a>
            </li>
          </ul>
        </nav>
      </div>
    </aside>

    <main class="app-main">
      <div class="app-content-header">
        <div class="container-fluid">
          <h3 class="mb-0" id="producto-nombre">Cargando...</h3>
        </div>
      </div>

      <div class="app-content">
        <div class="container-fluid">
          <div id="alert-box" class="alert" style="display:none"></div>

          <div class="row">
            <div class="col-md-5 mb-3">
              <img id="producto-imagen" src="/assets/img/logo.png" class="img-fluid rounded shadow-sm" alt="Producto">
            </div>
            <div class="col-md-7">
              <p id="producto-descripcion" class="text-muted"></p>
              <p>Categoría: <span id="producto-categoria">-</span></p>
              <p>Vendedor: <span id="producto-vendedor">-</span></p>
              <hr>
              <p>Estado: <span id="subasta-estado"></span></p>
              <p>Oferta actual: <strong id="subasta-monto"></strong></p>
              <p>Incremento mínimo: <span id="subasta-incremento"></span></p>
              <p>Inicia: <span id="subasta-inicio"></span></p>
              <p>Cierra: <span id="subasta-cierre"></span></p>
              <p id="ganador-container" style="display:none">Ganador: <strong id="subasta-ganador">-</strong></p>

              <div class="card mt-3" id="puja-card">
                <div class="card-body">
                  <h5 class="card-title">Hacer una oferta</h5>
                  <form id="form-puja" class="d-flex gap-2" onsubmit="event.preventDefault()">
                    <input type="number" step="0.01" id="monto-puja" class="form-control" placeholder="Tu oferta" required>
                    <button type="submit" class="btn btn-success" id="puja-button">Pujar</button>
                  </form>
                  <div id="puja-error" class="text-danger mt-2" style="display:none"></div>
                  <div id="puja-success" class="text-success mt-2" style="display:none"></div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    crossorigin="anonymous"></script>
  <script src="/js/adminlte.js"></script>
  <script type="module" src="/js/user/subasta-detail.js"></script>
</body>

</html>
