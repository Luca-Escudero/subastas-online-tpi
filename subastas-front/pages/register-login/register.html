<!doctype html>
<html lang="es">
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>Subastas Online | Crear Cuenta</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
    <link rel="preload" href="/css/adminlte.css" as="style" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@fontsource/source-sans-3@5.0.12/index.css"
      crossorigin="anonymous"
      media="print"
      onload="this.media='all'"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/overlayscrollbars@2.11.0/styles/overlayscrollbars.min.css"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="/css/adminlte.css" />
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body class="register-page bg-body-secondary">
    <div class="register-box" style="width: 420px">
      <div class="register-logo">
        <a href="/index.html"><b>Subastas</b> Online</a>
      </div>

      <div class="card">
        <div class="card-body register-card-body">
          <p class="login-box-msg">Crea tu cuenta para comprar y vender</p>

          <form id="form-register" onsubmit="event.preventDefault()">
            <div class="row">
              <div class="col-6 mb-3">
                <input type="text" id="nombre" class="form-control" placeholder="Nombre" required />
              </div>
              <div class="col-6 mb-3">
                <input type="text" id="apellido" class="form-control" placeholder="Apellido" required />
              </div>
            </div>

            <div class="input-group mb-3">
              <input type="email" id="email" class="form-control" placeholder="Email" required />
              <div class="input-group-text"><span class="bi bi-envelope"></span></div>
            </div>

            <div class="input-group mb-3">
              <input type="tel" id="telefono" class="form-control" placeholder="Teléfono" required />
              <div class="input-group-text"><span class="bi bi-telephone"></span></div>
            </div>

            <div class="input-group mb-3">
              <input
                type="password"
                id="password"
                class="form-control"
                placeholder="Contraseña (mínimo 8 caracteres)"
                minlength="8"
                required
              />
              <div class="input-group-text"><span class="bi bi-lock-fill"></span></div>
            </div>

            <div id="error" class="text-danger my-2" style="display: none"></div>
            <div id="success" class="text-success my-2" style="display: none"></div>

            <div class="row">
              <div class="col-12 d-flex justify-content-center">
                <div class="d-grid" style="max-width: 220px">
                  <button id="register-button" type="submit" class="btn btn-primary w-100">Registrarme</button>
                </div>
              </div>
            </div>
          </form>

          <p class="mb-4 text-center mt-2">
            <a href="login.html" class="text-center">Ya tengo cuenta</a>
          </p>
        </div>
      </div>
    </div>

    <script src="/js/adminlte.js"></script>
    <script type="module" src="/js/register.js"></script>
  </body>
</html>
