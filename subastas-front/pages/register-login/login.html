<!doctype html>
<html lang="es">
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>Subastas Online | Iniciar Sesión</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#007bff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1a1a1a" media="(prefers-color-scheme: dark)" />
    <meta name="description" content="Inicia sesión en Subastas Online para participar como comprador, vendedor o administrador." />

    <link rel="preload" href="/css/adminlte.css" as="style" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@fontsource/source-sans-3@5.0.12/index.css"
      crossorigin="anonymous"
      media="print"
      onload="this.media='all'"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/overlayscrollbars@2.11.0/styles/overlayscrollbars.min.css"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="/css/adminlte.css" />
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body class="login-page bg-body-secondary">
    <div class="login-box">
      <div class="login-logo">
        <a href="/index.html"><b>Subastas</b> Online</a>
      </div>

      <div class="card">
        <div class="card-body login-card-body">
          <p class="login-box-msg">Inicia sesión para pujar, vender o administrar</p>

          <form id="form-login" method="post" onsubmit="event.preventDefault()">
            <div class="input-group mb-3">
              <input type="email" id="email" name="email" class="form-control" placeholder="Email" required />
              <div class="input-group-text"><span class="bi bi-envelope"></span></div>
            </div>

            <div class="input-group mb-3">
              <input type="password" id="password" name="password" class="form-control" placeholder="Contraseña" required />
              <div class="input-group-text"><span class="bi bi-lock-fill"></span></div>
            </div>

            <div id="error" class="text-danger my-2" style="display: none"></div>

            <div class="row">
              <div class="col-12 d-flex justify-content-center">
                <div class="d-grid" style="max-width: 220px">
                  <button id="log-button" type="submit" class="btn btn-primary w-100">Iniciar Sesión</button>
                </div>
              </div>
            </div>
          </form>

          <p class="mb-4 text-center mt-2">
            <a href="register.html" class="text-center">Crear cuenta</a>
          </p>
        </div>
      </div>
    </div>

    <script src="/js/adminlte.js"></script>
    <script type="module" src="/js/login.js"></script>
  </body>
</html>
