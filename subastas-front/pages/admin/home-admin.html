<!doctype html>
<html lang="es">

<head>
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
  <title>Subastas Online | Panel Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    crossorigin="anonymous">
  <link rel="preload" href="/css/adminlte.css" as="style" />
  <link rel="stylesheet" href="/css/adminlte.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    crossorigin="anonymous" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>

<body class="layout-fixed sidebar-expand-lg sidebar-open bg-body-tertiary">
  <div class="app-wrapper">
    <nav class="app-header navbar navbar-expand bg-body">
      <div class="container-fluid">
        <ul class="navbar-nav">
          <li class="nav-item">
            <a class="nav-link" data-lte-toggle="sidebar" href="#" role="button">
              <i class="bi bi-list"></i>
            </a>
          </li>
        </ul>
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a href="/pages/register-login/login.html" class="nav-link" id="logout-button">Cerrar Sesión</a>
          </li>
        </ul>
      </div>
    </nav>

    <aside class="app-sidebar bg-body-secondary shadow" data-bs-theme="dark">
      <div class="sidebar-brand">
        <a href="/index.html" class="brand-link">
          <img src="/assets/img/logo.png" alt="Logo" class="brand-image opacity-75 shadow" />
          <span class="brand-text fw-light">Subastas Online</span>
        </a>
      </div>
      <div class="sidebar-wrapper">
        <nav class="mt-2">
          <ul class="nav sidebar-menu flex-column">
            <li class="nav-item">
              <a href="home-admin.html" class="nav-link active">
                <i class="nav-icon bi bi-people-fill"></i>
                <p>Usuarios</p>
              </a>
            </li>
          </ul>
        </nav>
      </div>
    </aside>

    <main class="app-main">
      <div class="app-content-header">
        <div class="container-fluid">
          <h3 class="mb-0">Administrar Usuarios</h3>
        </div>
      </div>

      <div class="app-content">
        <div class="container-fluid">

          <!-- Categorías -->
          <div class="card">
            <div class="card-header"><h3 class="card-title">Categorías</h3></div>
            <div class="card-body">
              <form id="form-categoria" class="d-flex gap-2 mb-3" onsubmit="event.preventDefault()">
                <input type="text" id="categoria-nombre" class="form-control" placeholder="Nueva categoría" required style="max-width:300px">
                <button type="submit" class="btn btn-primary">Agregar</button>
              </form>
              <div id="categoria-error" class="text-danger mb-2" style="display:none"></div>
              <div id="categorias-list" class="d-flex flex-wrap gap-2"></div>
            </div>
          </div>

          <!-- Usuarios -->
          <div class="card">
            <div class="card-header"><h3 class="card-title">Usuarios</h3></div>
            <div class="card-body p-0">
              <table class="table">
                <thead>
                  <tr>
                    <th>Nombre</th>
                    <th>Email</th>
                    <th>Teléfono</th>
                    <th>Roles</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                  </tr>
                </thead>
                <tbody id="usuarios-table-body"></tbody>
              </table>
            </div>
          </div>

        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    crossorigin="anonymous"></script>
  <script src="/js/adminlte.js"></script>
  <script type="module" src="/js/admin/home-admin.js"></script>
</body>

</html>
