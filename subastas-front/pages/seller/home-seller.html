<!doctype html>
<html lang="es">

<head>
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
  <title>Subastas Online | Panel Vendedor</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    crossorigin="anonymous">
  <link rel="preload" href="/css/adminlte.css" as="style" />
  <link rel="stylesheet" href="/css/adminlte.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    crossorigin="anonymous" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>

<body class="layout-fixed sidebar-expand-lg sidebar-open bg-body-tertiary">
  <div class="app-wrapper">
    <nav class="app-header navbar navbar-expand bg-body">
      <div class="container-fluid">
        <ul class="navbar-nav">
          <li class="nav-item">
            <a class="nav-link" data-lte-toggle="sidebar" href="#" role="button">
              <i class="bi bi-list"></i>
            </a>
          </li>
        </ul>
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a href="/pages/register-login/login.html" class="nav-link" id="logout-button">Cerrar Sesión</a>
          </li>
        </ul>
      </div>
    </nav>

    <aside class="app-sidebar bg-body-secondary shadow" data-bs-theme="dark">
      <div class="sidebar-brand">
        <a href="/index.html" class="brand-link">
          <img src="/assets/img/logo.png" alt="Logo" class="brand-image opacity-75 shadow" />
          <span class="brand-text fw-light">Subastas Online</span>
        </a>
      </div>
      <div class="sidebar-wrapper">
        <nav class="mt-2">
          <ul class="nav sidebar-menu flex-column">
            <li class="nav-item">
              <a href="/pages/user/home-user.html" class="nav-link">
                <i class="nav-icon bi bi-arrow-left"></i>
                <p>Ir al catálogo (comprar)</p>
              </a>
            </li>
            <li class="nav-item">
              <a href="home-seller.html" class="nav-link active">
                <i class="nav-icon bi bi-shop"></i>
                <p>Mis Productos / Ventas</p>
              </a>
            </li>
          </ul>
        </nav>
      </div>
    </aside>

    <main class="app-main">
      <div class="app-content-header">
        <div class="container-fluid">
          <h3 class="mb-0">Panel de Vendedor</h3>
        </div>
      </div>

      <div class="app-content">
        <div class="container-fluid">

          <!-- Crear producto -->
          <div class="card">
            <div class="card-header"><h3 class="card-title">Publicar Producto</h3></div>
            <div class="card-body">
              <form id="form-producto">
                <div class="row">
                  <div class="col-md-4 mb-3">
                    <label class="form-label">Nombre</label>
                    <input type="text" id="prod-nombre" class="form-control" required>
                  </div>
                  <div class="col-md-4 mb-3">
                    <label class="form-label">Categoría</label>
                    <select id="prod-categoria" class="form-select" required></select>
                  </div>
                  <div class="col-md-4 mb-3">
                    <label class="form-label">URL de imagen (opcional)</label>
                    <input type="text" id="prod-imagen" class="form-control" placeholder="https://...">
                  </div>
                  <div class="col-12 mb-3">
                    <label class="form-label">Descripción</label>
                    <textarea id="prod-descripcion" class="form-control" required></textarea>
                  </div>
                </div>
                <div id="producto-error" class="text-danger mb-2" style="display:none"></div>
                <button type="submit" class="btn btn-primary">Crear Producto</button>
              </form>
            </div>
          </div>

          <!-- Lista de productos -->
          <div class="card">
            <div class="card-header"><h3 class="card-title">Mis Productos</h3></div>
            <div class="card-body p-0">
              <table class="table">
                <thead>
                  <tr>
                    <th>Nombre</th>
                    <th>Categoría</th>
                    <th>Acciones</th>
                  </tr>
                </thead>
                <tbody id="productos-table-body"></tbody>
              </table>
            </div>
          </div>

          <!-- Crear subasta -->
          <div class="card">
            <div class="card-header"><h3 class="card-title">Crear Subasta</h3></div>
            <div class="card-body">
              <form id="form-subasta">
                <div class="row">
                  <div class="col-md-3 mb-3">
                    <label class="form-label">Producto</label>
                    <select id="sub-producto" class="form-select" required></select>
                  </div>
                  <div class="col-md-3 mb-3">
                    <label class="form-label">Fecha inicio</label>
                    <input type="datetime-local" id="sub-inicio" class="form-control" required>
                  </div>
                  <div class="col-md-3 mb-3">
                    <label class="form-label">Fecha cierre</label>
                    <input type="datetime-local" id="sub-cierre" class="form-control" required>
                  </div>
                  <div class="col-md-3 mb-3"></div>
                  <div class="col-md-3 mb-3">
                    <label class="form-label">Precio inicial</label>
                    <input type="number" step="0.01" id="sub-precio" class="form-control" required>
                  </div>
                  <div class="col-md-3 mb-3">
                    <label class="form-label">Incremento mínimo</label>
                    <input type="number" step="0.01" id="sub-incremento" class="form-control" required>
                  </div>
                </div>
                <div id="subasta-error" class="text-danger mb-2" style="display:none"></div>
                <button type="submit" class="btn btn-primary">Crear Subasta (queda en BORRADOR)</button>
              </form>
            </div>
          </div>

          <!-- Lista de subastas -->
          <div class="card">
            <div class="card-header"><h3 class="card-title">Mis Subastas</h3></div>
            <div class="card-body p-0">
              <table class="table">
                <thead>
                  <tr>
                    <th>Producto</th>
                    <th>Estado</th>
                    <th>Oferta actual</th>
                    <th>Inicio</th>
                    <th>Cierre</th>
                    <th>Ganador</th>
                    <th>Acciones</th>
                  </tr>
                </thead>
                <tbody id="subastas-table-body"></tbody>
              </table>
            </div>
          </div>

        </div>
      </div>
    </main>
  <!-- Modal Editar Producto -->
  <div class="modal fade" id="modal-editar-producto" tabindex="-1" aria-labelledby="modalEditarProductoLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="modalEditarProductoLabel">Editar Producto</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <form id="form-editar-producto">
            <input type="hidden" id="edit-prod-id">
            <div class="row">
              <div class="col-md-4 mb-3">
                <label class="form-label">Nombre</label>
                <input type="text" id="edit-prod-nombre" class="form-control" required>
              </div>
              <div class="col-md-4 mb-3">
                <label class="form-label">Categoría</label>
                <select id="edit-prod-categoria" class="form-select" required></select>
              </div>
              <div class="col-md-4 mb-3">
                <label class="form-label">URL de imagen (opcional)</label>
                <input type="text" id="edit-prod-imagen" class="form-control" placeholder="https://...">
              </div>
              <div class="col-12 mb-3">
                <label class="form-label">Descripción</label>
                <textarea id="edit-prod-descripcion" class="form-control" required></textarea>
              </div>
            </div>
            <div id="edit-producto-error" class="text-danger mb-2" style="display:none"></div>
            <div class="d-flex justify-content-end gap-2">
              <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
              <button type="submit" class="btn btn-primary" id="edit-producto-submit">Guardar Cambios</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    crossorigin="anonymous"></script>
  <script src="/js/adminlte.js"></script>
  <script type="module" src="/js/seller/home-seller.js"></script>
</body>

</html>
