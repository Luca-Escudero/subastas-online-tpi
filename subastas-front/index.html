<!doctype html>
<html lang="es">
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>Subastas Online</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  </head>
  <body>
    <script type="module">
      import { isAuthenticated, getSession, redirectToDashboard, PATHS } from "/js/modules/auth.js";

      if (isAuthenticated()) {
        redirectToDashboard(getSession());
      } else {
        window.location.href = PATHS.LOGIN;
      }
    </script>
  </body>
</html>
