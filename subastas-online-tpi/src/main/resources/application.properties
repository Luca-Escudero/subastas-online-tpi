spring.application.name=subastas-online-tpi

spring.config.import=optional:file:.env[.properties],optional:file:subastas-online-tpi/.env[.properties]

# Conexión mapeada a las variables del archivo .env
spring.datasource.url=jdbc:mysql://localhost:3306/${SUBASTAS_DB_NAME}?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=${SUBASTAS_DB_USER:root}
spring.datasource.password=${SUBASTAS_DB_PASSWORD:canalense8}

# Estrategia de Hibernate para crear las tablas solas
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Propiedad personalizada para el Token JWT
jwt.secret=${SUBASTAS_JWT_SECRET:miClaveSuperSecretaDe32Caracteres}
